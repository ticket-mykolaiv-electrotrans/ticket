<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Квиток</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 15px;
            background: #dbe4f4;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .logo-top {
            width: 54px; height: 54px;
            background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: -27px; z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo-top img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .card {
            width: 100%; max-width: 310px;
            background: white; border-radius: 20px;
            position: relative; text-align: center;
            overflow: hidden; padding-bottom: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        /* Оптимізований бігучий рядок */
        .marquee-wrap {
            background: linear-gradient(90deg, #eff8f2, #f0f6fb);
            height: 24px; margin: 35px 20px 8px 20px;
            border-radius: 12px; overflow: hidden;
            display: flex; align-items: center;
        }
        .marquee-inner { display: flex; white-space: nowrap; animation: scroll 25s linear infinite; }
        .marquee-inner span { color: #1a8a8a; font-size: 11px; font-weight: 500; padding-right: 40px; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        .title { font-size: 13px; color: #333; font-weight: 500; margin: 5px 0; }
        .line { width: 85%; height: 1px; background: #f0f4f8; margin: 6px auto; }
        .date { font-size: 11px; color: #888; margin-bottom: 2px; }
        .count { font-size: 22px; font-weight: 700; margin: 2px 0; }

        .timer {
            display: inline-flex; align-items: center;
            background: #f1f7f4; padding: 4px 12px; border-radius: 12px;
            font-size: 12px; font-weight: 600; margin: 6px 0 12px 0;
        }
        .dot { width: 6px; height: 6px; border: 1.5px solid #a8d5ba; border-radius: 50%; margin-right: 6px; }

        .cut-box { position: relative; width: 100%; height: 16px; display: flex; align-items: center; }
        .cut-line { width: 100%; border-top: 1px dashed #e2e8f0; }
        .cut-circle { position: absolute; width: 16px; height: 16px; background: #dbe4f4; border-radius: 50%; }
        .left { left: -8px; } .right { right: -8px; }

        .qr-area { position: relative; width: 145px; height: 145px; margin: 12px auto 0 auto; }
        .qr-icon {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 34px; height: 34px; background: white; display: flex; align-items: center; justify-content: center;
        }
        .qr-icon svg { width: 26px; height: 26px; }

        .num { font-size: 12px; color: #99a; margin: 12px 0 15px 0; }
        
        .bottom-waves {
            position: absolute; bottom: -6px; left: 0; width: 100%; height: 10px;
            background-image: radial-gradient(circle at 6px 0px, white 8px, transparent 9px);
            background-size: 12px 12px; background-repeat: repeat-x;
        }
    </style>
</head>
<body>

    <div class="logo-top">
        <img src="https://i.postimg.cc/QHkcrrrM/image.png">
    </div>

    <div class="card">
        <div class="marquee-wrap">
            <div class="marquee-inner">
                <span>Найголовніше — залишайтеся людьми і кричіть, що ви живі. Я живий! ⬥ Життя — цікаве</span>
                <span>Найголовніше — залишайтеся людьми і кричіть, що ви живі. Я живий! ⬥ Життя — цікаве</span>
            </div>
        </div>

        <div class="title" id="t-name">Миколаївелектротранс Трамвай</div>
        <div class="line"></div>
        <div class="date">Придбано <span id="t-date"></span></div>
        <div class="count">1 квиток</div>

        <div class="timer">
            <span class="dot"></span> Квиток дійсний — <span id="t-time">1:30:00</span>
        </div>

        <div class="cut-box">
            <div class="cut-circle left"></div>
            <div class="cut-line"></div>
            <div class="cut-circle right"></div>
        </div>

        <div class="qr-area">
            <div id="qrcode"></div>
            <div class="qr-icon">
                <svg viewBox="0 0 24 24"><path d="M12,8L10.67,8.09C9.81,7.07 7.4,4.5 5,4.5C5,4.5 3.03,7.46 4.96,11.41C4.41,12.24 4.07,12.67 4,13.66L4,13.88C4,15.11 4.29,15.7 5,16.4C5.7,17.1 6.55,17.5 7.5,17.5H16.5C17.45,17.5 18.3,17.1 19,16.4C19.71,15.7 20,15.11 20,13.88V13.66C19.93,12.67 19.59,12.24 19.04,11.41C20.97,7.46 19,4.5 19,4.5C16.6,4.5 14.19,7.07 13.33,8.09L12,8Z"/></svg>
            </div>
        </div>

        <div class="num">Номер: <span id="t-num"></span></div>
        <div class="bottom-waves"></div>
    </div>

<script>
    // Таймер
    let sec = 5400;
    setInterval(() => {
        sec--;
        let h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
        document.getElementById('t-time').innerText = `${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
    }, 1000);

    // Дата
    const d = new Date();
    const mNames = ['січня','лютого','березня','квітня','травня','червня','липня','серпня','вересня','жовтня','листопада','грудня'];
    document.getElementById('t-date').innerText = `${d.getDate()} ${mNames[d.getMonth()]} о ${d.getHours()}:${d.getMinutes()<10?'0'+d.getMinutes():d.getMinutes()}`;

    // Генерація
    const transport = Math.random() > 0.5 ? 'Трамвай' : 'Тролейбус';
    document.getElementById('t-name').innerText = 'Миколаївелектротранс ' + transport;
    const n = Math.floor(100000 + Math.random() * 900000);
    document.getElementById('t-num').innerText = n;

    new QRCode(document.getElementById("qrcode"), {
        text: "https://qr.privatbank.ua/" + n,
        width: 145, height: 145
    });
</script>
</body>
</html>
