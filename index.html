<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиток</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(160deg, #d6d8e2, #b5b8c6);
}

/* карточка */
.card {
    width: 92%;
    max-width: 360px;
    background: #f3f3f5;
    border-radius: 22px;
    padding: 22px 16px 50px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    position: relative;
}

/* волны снизу */
.card::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 30px;
    background: radial-gradient(circle at 15px 0, transparent 15px, #f3f3f5 16px);
    background-size: 30px 30px;
}

/* текст */
.title {
    font-size: 13px;
    color: #555;
    font-weight: 500;
}

.date {
    font-size: 12px;
    color: #888;
    margin: 4px 0 14px;
}

.ticket {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 12px;
}

/* таймер */
.timer {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 20px;
    background: linear-gradient(90deg, #b7eacb, #bcdcff);
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* QR */
.qr-wrapper {
    display: flex;
    justify-content: center;
}

#qrcode {
    padding: 10px;
    background: white;
    border-radius: 12px;
}

/* номер */
.number {
    font-size: 12px;
    color: #666;
    margin-top: 14px;
}

/* идеальная мобилка */
@media (max-width: 480px) {
    body {
        align-items: center;
        padding: 0;
    }
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Миколаївелектротранс (трамвай)</div>
    <div class="date">Придбано <span id="date"></span></div>

    <div class="ticket">1 квиток</div>

    <div class="timer">
        ● Квиток дійсний — <span id="time">60:00</span>
    </div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="number">Номер: <span id="ticketNumber"></span></div>
</div>

<script>
// фикс для iOS (ждём загрузку)
window.onload = () => {

    // дата
    let now = new Date();
    document.getElementById("date").innerText =
        now.getDate() + " " +
        ["січня","лютого","березня","квітня","травня","червня",
         "липня","серпня","вересня","жовтня","листопада","грудня"][now.getMonth()]
        + " о " +
        now.getHours().toString().padStart(2,'0') + ":" +
        now.getMinutes().toString().padStart(2,'0');

    // таймер
    let timeLeft = 60 * 60;

    setInterval(() => {
        let m = Math.floor(timeLeft / 60);
        let s = timeLeft % 60;

        document.getElementById("time").innerText =
            m.toString().padStart(2,'0') + ":" +
            s.toString().padStart(2,'0');

        if (timeLeft > 0) timeLeft--;
    }, 1000);

    // номер
    let ticketNumber = Math.floor(100000 + Math.random() * 900000);
    document.getElementById("ticketNumber").innerText = ticketNumber;

    // QR (фикс iOS)
    setTimeout(() => {
        new QRCode(document.getElementById("qrcode"), {
            text: "ticket:" + ticketNumber + "|time:" + Date.now(),
            width: 200,
            height: 200
        });
    }, 100);
};
</script>

</body>
</html>
