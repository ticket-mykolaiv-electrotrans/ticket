<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приват24 Квиток</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #dbe4f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .logo-container {
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: -32.5px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card {
            width: 330px;
            background: white;
            border-radius: 24px;
            position: relative;
            text-align: center;
            padding: 45px 0 25px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .title { font-size: 14.5px; color: #333; margin-top: 10px; font-weight: 400; }
        .date { font-size: 12.5px; color: #8a8a8a; margin-bottom: 12px; }
        
        .thin-line {
            width: 90%;
            height: 1px;
            background-color: #f1f5f9;
            margin: 0 auto;
        }

        .ticket { 
            font-size: 34px; 
            font-weight: 700; 
            margin-top: 15px;
            margin-bottom: 15px; 
            color: #000; 
            letter-spacing: -0.5px; 
        }

        .timer {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(90deg, #dcfce7, #dbeafe);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
            margin-top: 15px;
            margin-bottom: 25px;
        }

        .divider-container {
            position: relative;
            width: 100%;
            height: 22px;
            display: flex;
            align-items: center;
            margin: 10px 0;
        }

        .divider-line-solid {
            width: 100%;
            height: 1px;
            background-color: #f1f5f9;
        }

        .circle-cut {
            position: absolute;
            width: 22px;
            height: 22px;
            background: #dbe4f4; 
            border-radius: 50%;
            top: 0;
        }
        .left-cut { left: -11px; }
        .right-cut { right: -11px; }

        .qr-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px auto 0 auto;
            background: white;
            padding: 10px;
            border-radius: 20px; 
            width: 170px;
            height: 170px;
        }

        #qrcode {
            border-radius: 15px;
            overflow: hidden;
        }

        .qr-cat-logo {
            position: absolute;
            width: 48px; 
            height: 48px; 
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            border-radius: 8px;
        }

        .qr-cat-logo svg {
            width: 42px; 
            height: 42px; 
            fill: #000;
        }

        #qrcode canvas, #qrcode img {
            width: 170px !important;
            height: 170px !important;
            display: block;
        }

        .number { 
            font-size: 13.5px; 
            color: #94a3b8; 
            margin-top: 15px; 
            font-weight: 400;
        }

        .waves {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: radial-gradient(circle at 8px 12px, #dbe4f4 6px, transparent 7px);
            background-size: 16px 14px;
            background-repeat: repeat-x;
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://i.postimg.cc/QHkcrrrM/image.png" alt="MET Logo">
</div>

<div class="card">
    <div class="title" id="mainTitle">Миколаївелектротранс Трамвай</div>
    <div class="date">Придбано <span id="dateText"></span></div>
    
    <div class="thin-line"></div> 

    <div class="ticket">1 квиток</div>
    
    <div class="timer">
        ● Квиток дійсний — <span id="time">1:30:00</span>
    </div>

    <div class="divider-container">
        <div class="circle-cut left-cut"></div>
        <div class="divider-line-solid"></div>
        <div class="circle-cut right-cut"></div>
    </div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
        <div class="qr-cat-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12,8L10.67,8.09C9.81,7.07 7.4,4.5 5,4.5C5,4.5 3.03,7.46 4.96,11.41C4.41,12.24 4.07,12.67 4,13.66L4,13.88C4,15.11 4.29,15.7 5,16.4C5.7,17.1 6.55,17.5 7.5,17.5H16.5C17.45,17.5 18.3,17.1 19,16.4C19.71,15.7 20,15.11 20,13.88V13.66C19.93,12.67 19.59,12.24 19.04,11.41C20.97,7.46 19,4.5 19,4.5C16.6,4.5 14.19,7.07 13.33,8.09L12,8Z" />
            </svg>
        </div>
    </div>

    <div class="number">Номер: <span id="ticketNumber"></span></div>

    <div class="waves"></div>
</div>

<script>
    let totalSeconds = 5400; 
    const timeElement = document.getElementById('time');
    function updateTimer() {
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;
        timeElement.innerText = `${h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        if (totalSeconds > 0) totalSeconds--;
    }
    setInterval(updateTimer, 1000);

    const now = new Date();
    const months = ['березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня', 'січня', 'лютого'];
    document.getElementById('dateText').innerText = `${now.getDate()} ${months[now.getMonth()]} о ${now.getHours()}:${now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()}`;

    function generateTicket() {
        const transportType = Math.random() < 0.5 ? '(трамвай)' : '(тролейбус)';
        document.getElementById("mainTitle").innerText = `Миколаївелектротранс ${transportType}`;

        const randomNum = Math.floor(100000 + Math.random() * 900000);
        document.getElementById("ticketNumber").innerText = randomNum;

        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://qr.privatbank.ua/ticket/" + randomNum + Date.now(),
            width: 170,
            height: 170,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    generateTicket();
</script>

</body>
</html>
