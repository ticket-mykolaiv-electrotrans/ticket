<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приват24 Квиток</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #dbe4f4; /* Светло-голубой фон */
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 330px;
            background: white;
            border-radius: 20px 20px 0 0;
            position: relative;
            text-align: center;
            padding: 20px 0 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .title { font-size: 14px; color: #333; margin-bottom: 5px; }
        .date { font-size: 12px; color: #8a8a8a; margin-bottom: 15px; }
        .ticket { font-size: 34px; font-weight: 700; margin-bottom: 15px; color: #000; letter-spacing: -0.5px; }

        .timer {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(90deg, #dcfce7, #dbeafe);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .timer span { margin-left: 5px; }

        /* Разделительная линия с боковыми вырезами */
        .divider-line {
            margin: 30px 0;
            border-top: 2px dashed #f1f5f9;
            position: relative;
        }
        .divider-line::before, .divider-line::after {
            content: ''; position: absolute; top: -11px;
            width: 22px; height: 22px; background: #dbe4f4; border-radius: 50%;
        }
        .divider-line::before { left: -11px; }
        .divider-line::after { right: -11px; }

        /* Стили для QR-кода */
        .qr-wrapper {
            display: flex;
            justify-content: center;
            margin: 0 auto;
            /* Белый фон и скругление как на твоем фото-примере */
            background: white;
            padding: 10px;
            border-radius: 15px;
            width: 180px;
            height: 180px;
        }

        /* Центрируем сам холст QR-кода внутри обертки */
        #qrcode img, #qrcode canvas {
            display: block;
            margin: 0 auto;
        }

        .number { font-size: 13px; color: #94a3b8; margin-top: 15px; }

        /* Маленькие и аккуратные волны снизу */
        .waves {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: radial-gradient(circle at 8px 12px, #dbe4f4 6px, transparent 7px);
            background-size: 16px 14px;
            background-repeat: repeat-x;
        }

        @media (max-width: 480px) {
            body { align-items: center; padding: 0; }
        }
    </style>
</head>

<body>

<div class="card">
    <div class="title">Миколаївелектротранс (трамвай)</div>
    <div class="date">Придбано <span id="dateText"></span></div>

    <div class="ticket">1 квиток</div>

    <div class="timer">
        ● Квиток дійсний — <span id="time">1:30:00</span>
    </div>

    <div class="divider-line"></div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="number">Номер: <span id="ticketNumber">332919</span></div>

    <div class="waves"></div>
</div>

<script>
    // 1. Логика таймера на 90 минут (5400 секунд)
    let totalSeconds = 5400; 
    const timeElement = document.getElementById('time');

    function updateTimer() {
        let hours = Math.floor(totalSeconds / 3600);
        let minutes = Math.floor((totalSeconds % 3600) / 60);
        let seconds = totalSeconds % 60;

        let displayMinutes = minutes < 10 ? '0' + minutes : minutes;
        let displaySeconds = seconds < 10 ? '0' + seconds : seconds;

        timeElement.innerText = `${hours}:${displayMinutes}:${displaySeconds}`;

        if (totalSeconds > 0) {
            totalSeconds--;
        } else {
            clearInterval(timerInterval);
            timeElement.innerText = "0:00:00";
        }
    }
    const timerInterval = setInterval(updateTimer, 1000);

    // 2. Установка текущей даты
    const now = new Date();
    const months = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];
    document.getElementById('dateText').innerText = `${now.getDate()} ${months[now.getMonth()]} о ${now.getHours()}:${now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()}`;

    // 3. Генерация НАСТОЯЩЕГО РАНДОМНОГО QR-кода
    function generateRealQR() {
        // Генерируем случайное длинное число для начинки кода
        const randomData = Math.floor(Math.random() * 1000000000).toString();
        
        // Очищаем контейнер перед генерацией
        document.getElementById("qrcode").innerHTML = "";

        // Используем библиотеку QRCode.js
        new QRCode(document.getElementById("qrcode"), {
            text: randomData,    // Данные, которые зашиты
            width: 180,           // Ширина
            height: 180,          // Высота
            colorDark : "#000000",// Цвет кода
            colorLight : "#ffffff",// Цвет фона
            correctLevel : QRCode.CorrectLevel.H // Высокий уровень коррекции ошибок
        });
    }

    // Запускаем генерацию при загрузке страницы
    generateRealQR();
</script>

</body>
</html>
