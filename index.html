<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приват24 Квиток</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #dbe4f4;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 330px;
            background: white;
            border-radius: 20px 20px 0 0;
            position: relative;
            text-align: center;
            padding: 20px 0 30px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .title { font-size: 14px; color: #333; margin-bottom: 5px; }
        .date { font-size: 12px; color: #8a8a8a; margin-bottom: 15px; }
        .ticket { font-size: 34px; font-weight: 700; margin-bottom: 15px; color: #000; letter-spacing: -0.5px; }

        .timer {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(90deg, #dcfce7, #dbeafe);
            padding: 8px 18px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .divider-line {
            margin: 30px 0;
            border-top: 2px dashed #f1f5f9;
            position: relative;
        }
        .divider-line::before, .divider-line::after {
            content: ''; position: absolute; top: -11px;
            width: 22px; height: 22px; background: #dbe4f4; border-radius: 50%;
        }
        .divider-line::before { left: -11px; }
        .divider-line::after { right: -11px; }

        /* ИСПРАВЛЕННЫЙ БЛОК QR-КОДА */
        .qr-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            background: white;
            padding: 12px;
            border-radius: 15px;
            /* Фиксируем размер контейнера, чтобы он не "плыл" */
            width: 160px; 
            height: 160px;
            box-shadow: 0 0 5px rgba(0,0,0,0.02);
        }

        /* Заставляем само изображение QR быть строго квадратным */
        #qrcode img {
            width: 160px !important;
            height: 160px !important;
            display: block;
        }

        .number { font-size: 13px; color: #94a3b8; margin-top: 15px; }

        .waves {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: radial-gradient(circle at 8px 12px, #dbe4f4 6px, transparent 7px);
            background-size: 16px 14px;
            background-repeat: repeat-x;
        }

        @media (max-width: 480px) {
            body { align-items: center; padding: 0; }
        }
    </style>
</head>

<body>

<div class="card">
    <div class="title">Миколаївелектротранс (трамвай)</div>
    <div class="date">Придбано <span id="dateText"></span></div>

    <div class="ticket">1 квиток</div>

    <div class="timer">
        ● Квиток дійсний — <span id="time">1:30:00</span>
    </div>

    <div class="divider-line"></div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="number">Номер: <span id="ticketNumber"></span></div>

    <div class="waves"></div>
</div>

<script>
    // 1. Таймер на 90 минут
    let totalSeconds = 5400; 
    const timeElement = document.getElementById('time');

    function updateTimer() {
        let hours = Math.floor(totalSeconds / 3600);
        let minutes = Math.floor((totalSeconds % 3600) / 60);
        let seconds = totalSeconds % 60;
        timeElement.innerText = `${hours}:${minutes < 10 ? '0' + minutes : minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
        if (totalSeconds > 0) totalSeconds--;
    }
    setInterval(updateTimer, 1000);

    // 2. Текущая дата
    const now = new Date();
    const months = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];
    document.getElementById('dateText').innerText = `${now.getDate()} ${months[now.getMonth()]} о ${now.getHours()}:${now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()}`;

    // 3. РАНДОМНЫЙ НОМЕР И КВАРКОД
    function generateTicket() {
        const randomNum = Math.floor(Math.random() * (999999 - 300000 + 1)) + 300000;
        document.getElementById("ticketNumber").innerText = "0" + Math.floor(Math.random() * 90000 + 10000); // 6-значный номер как на фото

        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://privatbank.ua/qr/" + randomNum, // Имитируем реальную ссылку внутри
            width: 160,
            height: 160,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }

    generateTicket();
</script>

</body>
</html>
