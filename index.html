<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приват24 Квиток</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background: #dbe4f4;
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .logo-container {
            width: 60px; height: 60px;
            background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: -30px; z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .card {
            width: 90%; max-width: 320px;
            background: white; border-radius: 24px;
            position: relative; text-align: center;
            padding-bottom: 5px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        /* КОМПАКТНИЙ БІГУЧИЙ РЯДОК */
        .marquee-bar {
            background: linear-gradient(90deg, #eff8f2, #f0f6fb);
            height: 28px; /* Фіксована маленька висота */
            margin: 42px 25px 8px 25px;
            border-radius: 14px; 
            overflow: hidden;
            display: flex; align-items: center;
        }
        .marquee-content { display: flex; white-space: nowrap; animation: scroll-text 30s linear infinite; }
        .marquee-text { 
            color: #1a8a8a; font-size: 12px; font-weight: 500; 
            padding-right: 40px; 
        }

        @keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .title { font-size: 14px; color: #444; margin-top: 4px; font-weight: 500; }
        .text-divider { width: 85%; height: 1px; background-color: #f1f5f9; margin: 8px auto; }
        .date { font-size: 12px; color: #8c8c8c; margin-bottom: 4px; }
        
        .ticket { 
            font-size: 26px; font-weight: 700; 
            margin: 4px 0; color: #000; letter-spacing: -0.5px;
        }

        .timer-btn {
            display: inline-flex; align-items: center;
            background: linear-gradient(90deg, #eff8f2, #f0f6fb);
            padding: 4px 14px; border-radius: 15px;
            font-size: 13px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 12px;
        }
        .status-circle {
            width: 7px; height: 7px; border: 1.5px solid #a8d5ba;
            border-radius: 50%; margin-right: 5px;
        }

        .divider-container {
            position: relative; width: 100%; height: 20px;
            display: flex; align-items: center;
        }
        .divider-line { width: 100%; height: 1px; border-top: 1px dashed #e2e8f0; }
        .circle-cut { position: absolute; width: 20px; height: 20px; background: #dbe4f4; border-radius: 50%; }
        .left-cut { left: -10px; }
        .right-cut { right: -10px; }

        .qr-wrapper {
            position: relative;
            display: flex; justify-content: center; align-items: center;
            margin: 10px auto 0 auto;
            width: 155px; height: 155px; /* Трохи компактніший QR */
        }
        .qr-cat-logo {
            position: absolute; width: 38px; height: 38px; 
            background: white; display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }
        .qr-cat-logo svg { width: 30px; height: 30px; fill: #000; }

        .number { 
            font-size: 13px; color: #94a3b8; 
            margin-top: 15px; margin-bottom: 25px; 
        }

        .waves-container {
            position: absolute; bottom: -10px; left: 0; width: 100%; height: 12px;
            background-image: radial-gradient(circle at 8px 0px, white 10px, transparent 11px);
            background-size: 16px 16px; background-repeat: repeat-x;
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="https://i.postimg.cc/QHkcrrrM/image.png" alt="MET Logo">
</div>

<div class="card">
    <div class="marquee-bar">
        <div class="marquee-content">
            <div class="marquee-text">Найголовніше — залишайтеся людьми і кричіть, що ви живі. Я живий! ⬥ Життя — цікаве, і мотивація то є сильна.</div>
            <div class="marquee-text">Найголовніше — залишайтеся людьми і кричіть, що ви живі. Я живий! ⬥ Життя — цікаве, і мотивація то є сильна.</div>
        </div>
    </div>

    <div class="title" id="mainTitle">Миколаївелектротранс Трамвай</div>
    <div class="text-divider"></div> 
    <div class="date">Придбано <span id="dateText"></span></div>
    <div class="ticket">1 квиток</div>
    
    <div class="timer-btn">
        <span class="status-circle"></span> Квиток дійсний — <span id="time">1:30:00</span>
    </div>

    <div class="divider-container">
        <div class="circle-cut left-cut"></div>
        <div class="divider-line"></div>
        <div class="circle-cut right-cut"></div>
    </div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
        <div class="qr-cat-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12,8L10.67,8.09C9.81,7.07 7.4,4.5 5,4.5C5,4.5 3.03,7.46 4.96,11.41C4.41,12.24 4.07,12.67 4,13.66L4,13.88C4,15.11 4.29,15.7 5,16.4C5.7,17.1 6.55,17.5 7.5,17.5H16.5C17.45,17.5 18.3,17.1 19,16.4C19.71,15.7 20,15.11 20,13.88V13.66C19.93,12.67 19.59,12.24 19.04,11.41C20.97,7.46 19,4.5 19,4.5C16.6,4.5 14.19,7.07 13.33,8.09L12,8Z" />
            </svg>
        </div>
    </div>

    <div class="number">Номер: <span id="ticketNumber"></span></div>
    <div class="waves-container"></div>
</div>

<script>
    let totalSeconds = 5400; 
    const timeElement = document.getElementById('time');
    function updateTimer() {
        let h = Math.floor(totalSeconds / 3600);
        let m = Math.floor((totalSeconds % 3600) / 60);
        let s = totalSeconds % 60;
        timeElement.innerText = `${h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
        if (totalSeconds > 0) totalSeconds--;
    }
    setInterval(updateTimer, 1000);

    const now = new Date();
    const months = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];
    document.getElementById('dateText').innerText = `${now.getDate()} ${months[now.getMonth()]} о ${now.getHours()}:${now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()}`;

    function initTicket() {
        const transport = Math.random() < 0.5 ? 'Трамвай' : 'Тролейбус';
        document.getElementById("mainTitle").innerText = `Миколаївелектротранс ${transport}`;
        const randomNum = Math.floor(100000 + Math.random() * 900000);
        document.getElementById("ticketNumber").innerText = randomNum;
        document.getElementById("qrcode").innerHTML = "";
        
        new QRCode(document.getElementById("qrcode"), {
            text: "https://qr.privatbank.ua/" + randomNum,
            width: 155, height: 155,
            colorDark : "#000000", colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }
    initTicket();
</script>
</body>
</html>
