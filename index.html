<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Приват24 Квиток</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #dbe4f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 330px;
            background: white;
            border-radius: 24px 24px 0 0;
            position: relative;
            text-align: center;
            padding: 25px 0 35px 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .title { font-size: 14.5px; color: #444; margin-bottom: 6px; font-weight: 400; }
        .date { font-size: 13px; color: #8e8e93; margin-bottom: 18px; }
        
        /* ИСПРАВЛЕННЫЙ РАЗМЕР "1 КВИТОК" */
        .ticket { 
            font-size: 42px; 
            font-weight: 800; 
            margin-bottom: 18px; 
            color: #000; 
            letter-spacing: -1px;
        }

        .timer {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(90deg, #e3f9e5, #e1effe);
            padding: 9px 20px;
            border-radius: 25px;
            font-size: 15.5px;
            font-weight: 600;
            color: #1c1c1e;
        }

        .divider-line {
            margin: 35px 0;
            border-top: 2px dashed #f2f2f7;
            position: relative;
        }
        .divider-line::before, .divider-line::after {
            content: ''; position: absolute; top: -11px;
            width: 22px; height: 22px; background: #dbe4f4; border-radius: 50%;
        }
        .divider-line::before { left: -11px; }
        .divider-line::after { right: -11px; }

        /* КОНТЕЙНЕР ДЛЯ QR */
        .qr-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            background: white;
            padding: 10px;
            border-radius: 12px;
            width: 170px;
            height: 170px;
        }

        /* Чтобы QR не сплющивало */
        #qrcode canvas, #qrcode img {
            width: 170px !important;
            height: 170px !important;
            display: block;
        }

        .number { 
            font-size: 14px; 
            color: #8e8e93; 
            margin-top: 18px; 
            font-weight: 400;
        }

        .waves {
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 10px;
            background-image: radial-gradient(circle at 8px 12px, #dbe4f4 6px, transparent 7px);
            background-size: 16px 14px;
            background-repeat: repeat-x;
        }

        @media (max-width: 480px) {
            body { align-items: center; }
        }
    </style>
</head>

<body>

<div class="card">
    <div class="title">Миколаївелектротранс (трамвай)</div>
    <div class="date">Придбано <span id="dateText"></span></div>

    <div class="ticket">1 квиток</div>

    <div class="timer">
        ● Квиток дійсний — <span id="time">1:30:00</span>
    </div>

    <div class="divider-line"></div>

    <div class="qr-wrapper">
        <div id="qrcode"></div>
    </div>

    <div class="number">Номер: <span id="ticketNumber"></span></div>

    <div class="waves"></div>
</div>

<script>
    // 1. Таймер на 90 минут
    let totalSeconds = 5400; 
    const timeElement = document.getElementById('time');

    function updateTimer() {
        let hours = Math.floor(totalSeconds / 3600);
        let minutes = Math.floor((totalSeconds % 3600) / 60);
        let seconds = totalSeconds % 60;
        timeElement.innerText = `${hours}:${minutes < 10 ? '0' + minutes : minutes}:${seconds < 10 ? '0' + seconds : seconds}`;
        if (totalSeconds > 0) totalSeconds--;
    }
    setInterval(updateTimer, 1000);

    // 2. Дата (текущая)
    const now = new Date();
    const months = ['січня', 'лютого', 'березня', 'квітня', 'травня', 'червня', 'липня', 'серпня', 'вересня', 'жовтня', 'листопада', 'грудня'];
    document.getElementById('dateText').innerText = `${now.getDate()} ${months[now.getMonth()]} о ${now.getHours()}:${now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes()}`;

    // 3. Генерация номера и QR
    function generateTicket() {
        // Рандомный 6-значный номер
        const randomNum = Math.floor(100000 + Math.random() * 900000);
        document.getElementById("ticketNumber").innerText = randomNum;

        document.getElementById("qrcode").innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: "https://ticket" + randomNum,
            width: 170,
            height: 170,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.M
        });
    }

    generateTicket();
</script>

</body>
</html>
